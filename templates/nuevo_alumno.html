{% extends "base.html" %}
{% block title %}Nuevo alumno{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nuevo alumno</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required>
        </div>
        <div class="form-group">
            <label>Teléfono / WhatsApp</label>
            <input type="text" name="telefono" placeholder="Ej: 2604123456">
        </div>
        <div class="form-group">
            <label>Año / Curso</label>
            <input type="text" name="año_curso" placeholder="Ej: 3° año">
        </div>
        <div class="form-group">
            <label>Colegio</label>
            <select name="id_colegio">
                <option value="">— Sin asignar —</option>
                {% for c in colegios %}
                <option value="{{ c.id }}">{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Docente de referencia</label>
            <select name="id_docente">
                <option value="">— Sin asignar —</option>
                {% for d in docentes %}
                <option value="{{ d.id }}">{{ d.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Guardar alumno</button>
    </form>
</div>
{% endblock %}
