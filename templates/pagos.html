{% extends "base.html" %}
{% block title %}Pagos{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Pagos</h1>
    <a href="/pagos/nuevo" class="btn btn-primary">+ Registrar pago</a>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Alumno</th>
                <th>Monto</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pagos %}
            <tr>
                <td>{{ p.fecha }}</td>
                <td>{{ p.alumno }}</td>
                <td class="amount amount-total">${{ "{:,.0f}".format(p.monto) }}</td>
            </tr>
            {% else %}
            <tr class="empty-row">
                <td colspan="3">No hay pagos registrados todavía.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
