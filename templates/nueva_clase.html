{% extends "base.html" %}
{% block title %}Nueva clase{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Nueva clase</h1>
</div>

<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Fecha</label>
            <input type="date" name="fecha" required>
        </div>
        <div class="form-group">
            <label>Alumno</label>
            <select name="id_alumno" required>
                <option value="">Seleccioná un alumno</option>
                {% for a in alumnos %}
                <option value="{{ a.id }}">{{ a.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Asignatura</label>
            <select name="id_asignatura" required>
                <option value="">Seleccioná una asignatura</option>
                {% for as_ in asignaturas %}
                <option value="{{ as_.id }}">{{ as_.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Horas</label>
            <input type="number" name="horas" step="0.5" min="0.5" placeholder="1.5" required>
        </div>
        <div class="form-group">
            <label>Valor por hora ($)</label>
            <input type="number" name="valor_hora" min="0" placeholder="12000" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar clase</button>
    </form>
</div>
{% endblock %}
